version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/secrets/gcp-key.json
    - GCP_PROJECT_ID=${GCP_PROJECT_ID}
    - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
    - BQ_DATASET_BRONZE=${BQ_DATASET_BRONZE}
    - BQ_DATASET_SILVER=${BQ_DATASET_SILVER}
    - BQ_DATASET_GOLD=${BQ_DATASET_GOLD}
    - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    - COMPANY_ADDRESS=${COMPANY_ADDRESS}
    - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    - SLACK_CHANNEL=${SLACK_CHANNEL}
    - SPARK_MASTER=${SPARK_MASTER}
    - STRAVA_SIMULATION_MONTHS=${STRAVA_SIMULATION_MONTHS}
    - STRAVA_SIMULATION_MIN_ROWS=${STRAVA_SIMULATION_MIN_ROWS}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./data:/opt/airflow/data
    - ./dbt_sport:/opt/airflow/dbt_sport
    - ./ge_tests:/opt/airflow/ge_tests
    - ./secret:/opt/airflow/secrets
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # --- Airflow Metadata DB ---
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # --- Airflow Init ---
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@sportdata.com
    restart: "no"

  # --- Airflow Webserver ---
  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  # --- Airflow Scheduler ---
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

volumes:
  postgres-data:
  airflow-logs: